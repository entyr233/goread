name: Build Unsigned iOS IPA

on:
  push:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: "20"
  IOS_SCHEME: GoRead_iOS
  IOS_WORKSPACE: src-tauri/gen/apple/GoRead.xcworkspace
  IOS_PROJECT_DIR: src-tauri/gen/apple

jobs:
  build-ios:
    runs-on: macos-14
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Sync frontend assets into iOS bundle resources
        run: |
          set -euo pipefail
          IOS_ASSETS_DIR="src-tauri/gen/apple/assets"
          rm -rf "$IOS_ASSETS_DIR"
          mkdir -p "$IOS_ASSETS_DIR"
          cp -R dist/. "$IOS_ASSETS_DIR/"
          if [ ! -f "$IOS_ASSETS_DIR/index.html" ]; then
            echo "::error::index.html was not copied into iOS assets."
            exit 1
          fi

      - name: Install CocoaPods dependencies
        run: |
          set -euo pipefail
          cd "$IOS_PROJECT_DIR"
          pod install

      - name: Build iOS Rust static library
        run: |
          set -euo pipefail
          mkdir -p src-tauri/gen/apple/Externals/arm64/release
          mkdir -p src-tauri/gen/apple/Externals/x86_64/release
          node -e "const fs=require('fs');const p='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(p,'utf8'));c.build=c.build||{};delete c.build.devUrl;c.build.frontendDist='../dist';fs.writeFileSync(p,JSON.stringify(c,null,2));"
          # Force iOS CI build to produce staticlib only, so mobile plugin symbols
          # resolved by Xcode are not required during a Rust cdylib link step.
          sed -i '' 's/crate-type = \["staticlib", "cdylib", "rlib"\]/crate-type = ["staticlib"]/g' src-tauri/Cargo.toml
          cargo build --manifest-path src-tauri/Cargo.toml --lib --target aarch64-apple-ios --release
          cp src-tauri/target/aarch64-apple-ios/release/libgoread_lib.a src-tauri/gen/apple/Externals/arm64/release/libapp.a
          cp src-tauri/target/aarch64-apple-ios/release/libgoread_lib.a src-tauri/gen/apple/Externals/x86_64/release/libapp.a

      - name: Disable Tauri Xcode Rust build script
        run: |
          set -euo pipefail
          PBXPROJ="src-tauri/gen/apple/GoRead.xcodeproj/project.pbxproj"
          sed -i '' -E 's#shellScript = ".*tauri ios xcode-script.*";#shellScript = "echo Using prebuilt libapp.a for CI";#' "$PBXPROJ"

      - name: Build unsigned .app
        run: |
          set -euo pipefail
          IOS_DERIVED_DATA="$RUNNER_TEMP/DerivedData"
          IOS_EXPORT_DIR="$GITHUB_WORKSPACE/build/ios"
          IOS_LOG_PATH="$IOS_EXPORT_DIR/xcode-build.log"
          mkdir -p "$IOS_EXPORT_DIR"

          xcodebuild \
            -workspace "$IOS_WORKSPACE" \
            -scheme "$IOS_SCHEME" \
            -configuration release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -derivedDataPath "$IOS_DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build \
            | tee "$IOS_LOG_PATH"

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          IOS_DERIVED_DATA="$RUNNER_TEMP/DerivedData"
          IOS_EXPORT_DIR="$GITHUB_WORKSPACE/build/ios"

          APP_PATH=$(find "$IOS_DERIVED_DATA/Build/Products/release-iphoneos" -maxdepth 1 -name "*.app" -print -quit)
          if [ -z "${APP_PATH:-}" ]; then
            echo "::error::No .app bundle was produced by xcodebuild."
            exit 1
          fi

          PAYLOAD_DIR="$RUNNER_TEMP/Payload"
          rm -rf "$PAYLOAD_DIR"
          mkdir -p "$PAYLOAD_DIR"
          cp -R "$APP_PATH" "$PAYLOAD_DIR/"

          APP_IN_PAYLOAD=$(find "$PAYLOAD_DIR" -maxdepth 1 -name "*.app" -print -quit)
          if [ -z "${APP_IN_PAYLOAD:-}" ]; then
            echo "::error::Packaged app not found under Payload."
            exit 1
          fi

          mkdir -p "$APP_IN_PAYLOAD/Frameworks"
          if [ -f "$APP_IN_PAYLOAD/Frameworks/libpdfium.dylib" ]; then
            :
          elif [ -f "src-tauri/src/pdfium/ios/libpdfium.dylib" ]; then
            cp "src-tauri/src/pdfium/ios/libpdfium.dylib" "$APP_IN_PAYLOAD/Frameworks/libpdfium.dylib"
          else
            echo "::error::libpdfium.dylib not found in Frameworks or source path."
            exit 1
          fi

          # Keep a root-level copy for compatibility with loaders that still resolve ./libpdfium.dylib.
          cp "$APP_IN_PAYLOAD/Frameworks/libpdfium.dylib" "$APP_IN_PAYLOAD/libpdfium.dylib"

          APP_EXECUTABLE=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_IN_PAYLOAD/Info.plist")
          APP_BIN="$APP_IN_PAYLOAD/$APP_EXECUTABLE"
          if [ ! -f "$APP_BIN" ]; then
            echo "::error::App executable not found: $APP_BIN"
            exit 1
          fi

          # Rewrite loader path to a stable location under Frameworks.
          install_name_tool -change ./libpdfium.dylib @executable_path/Frameworks/libpdfium.dylib "$APP_BIN" || true
          install_name_tool -change @loader_path/libpdfium.dylib @executable_path/Frameworks/libpdfium.dylib "$APP_BIN" || true

          echo "Linked dylibs for $APP_EXECUTABLE:"
          otool -L "$APP_BIN" | sed 's/^/  /'
          ls -la "$APP_IN_PAYLOAD" | sed 's/^/  /'
          ls -la "$APP_IN_PAYLOAD/Frameworks" | sed 's/^/  /'

          APP_NAME=$(basename "$APP_PATH" .app)
          IPA_PATH="$IOS_EXPORT_DIR/${APP_NAME}-unsigned.ipa"

          cd "$RUNNER_TEMP"
          ditto -c -k --sequesterRsrc --keepParent Payload "$IPA_PATH"

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: goread-ios-unsigned-ipa
          path: build/ios/*.ipa
          if-no-files-found: error

      - name: Upload Xcode logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: goread-ios-build-logs
          path: build/ios/xcode-build.log
          if-no-files-found: warn
