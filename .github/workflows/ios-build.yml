name: Build Unsigned iOS IPA

on:
  push:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: "20"
  IOS_SCHEME: GoRead_iOS
  IOS_WORKSPACE: src-tauri/gen/apple/GoRead.xcworkspace
  IOS_PROJECT_DIR: src-tauri/gen/apple
  IOS_DERIVED_DATA: ${{ runner.temp }}/DerivedData
  IOS_EXPORT_DIR: ${{ github.workspace }}/build/ios

jobs:
  build-ios:
    runs-on: macos-14
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Install CocoaPods dependencies
        run: |
          set -euo pipefail
          cd "$IOS_PROJECT_DIR"
          pod install

      - name: Build unsigned .app
        run: |
          set -euo pipefail
          mkdir -p "$IOS_EXPORT_DIR"

          xcodebuild \
            -workspace "$IOS_WORKSPACE" \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -derivedDataPath "$IOS_DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build \
            | tee "$RUNNER_TEMP/xcode-build.log"

      - name: Package unsigned IPA
        run: |
          set -euo pipefail

          APP_PATH=$(find "$IOS_DERIVED_DATA/Build/Products/Release-iphoneos" -maxdepth 1 -name "*.app" -print -quit)
          if [ -z "${APP_PATH:-}" ]; then
            echo "::error::No .app bundle was produced by xcodebuild."
            exit 1
          fi

          PAYLOAD_DIR="$RUNNER_TEMP/Payload"
          rm -rf "$PAYLOAD_DIR"
          mkdir -p "$PAYLOAD_DIR"
          cp -R "$APP_PATH" "$PAYLOAD_DIR/"

          APP_NAME=$(basename "$APP_PATH" .app)
          IPA_PATH="$IOS_EXPORT_DIR/${APP_NAME}-unsigned.ipa"

          cd "$RUNNER_TEMP"
          ditto -c -k --sequesterRsrc --keepParent Payload "$IPA_PATH"

          echo "UNSIGNED_IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: goread-ios-unsigned-ipa
          path: ${{ env.UNSIGNED_IPA_PATH }}
          if-no-files-found: error

      - name: Upload Xcode logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: goread-ios-build-logs
          path: ${{ runner.temp }}/xcode-build.log
          if-no-files-found: warn
