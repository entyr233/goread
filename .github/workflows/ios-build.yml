name: iOS Build IPA
on: [push, workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true 

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Dependencies
        run: npm install

      # 1. 生成 iOS 原生工程
      - name: Init iOS Project
        run: npx tauri ios init

      # 2. 注入免签补丁
      - name: Patch Xcode Project for Unsigned Build
        run: |
          PROJECT_FILE=$(find src-tauri/gen/apple -name "project.pbxproj" | head -n 1)
          
          if [ -n "$PROJECT_FILE" ] && [ -f "$PROJECT_FILE" ]; then
            echo "正在给 $PROJECT_FILE 打补丁以禁用自动签名..."
            sed -i '' -E 's/DEVELOPMENT_TEAM = [^;]+;/DEVELOPMENT_TEAM = "";/g' "$PROJECT_FILE"
            sed -i '' -E 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' "$PROJECT_FILE"
            sed -i '' -E 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PROJECT_FILE"
            sed -i '' -E 's/CODE_SIGN_IDENTITY = "[^"]+";/CODE_SIGN_IDENTITY = "";/g' "$PROJECT_FILE"
            echo "补丁打入完毕！"
          else
            echo "错误：未找到 project.pbxproj 文件"
            exit 1
          fi

      # 3. 核心修改：弃用 tauri ios build，直接使用底层 xcodebuild 进行纯编译
      - name: Build iOS using pure xcodebuild
        run: |
          cd src-tauri/gen/apple
          # 指定 SYMROOT 将编译产物强制输出到当前 build 目录下，并彻底关闭签名
          xcodebuild -workspace GoRead.xcworkspace \
            -scheme GoRead_iOS \
            -configuration release \
            -sdk iphoneos \
            SYMROOT="$(PWD)/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build

      # 4. 手动抓取生成的 .app 并打包为 .ipa
      - name: Package IPA
        run: |
          mkdir -p Payload
          # 从 xcodebuild 指定的 build 目录中寻找生成的 .app 文件
          find src-tauri/gen/apple/build -name "*.app" -exec cp -r {} Payload/ \;
          zip -r unsigned_project.ipa Payload
        
      # 5. 上传供下载
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-ipa
          path: unsigned_project.ipa
